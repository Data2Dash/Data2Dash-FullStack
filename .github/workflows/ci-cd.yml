name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  # ── Stage 1: Lint & Security (parallel) ────────────────────────────────
  frontend-typecheck:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check backend_python/ --select E,F,W --ignore E501,E401,E402,E701,E702,E722,E741

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: npm ci
      - name: NPM audit
        run: npm audit --audit-level=high || true
      - name: Python dependency audit
        run: |
          pip install pip-audit
          pip-audit -r backend_python/requirements.txt --skip-editable || true

  # ── Stage 2: Test & Build (parallel, needs Stage 1) ────────────────────
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: [frontend-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000
      - name: Check bundle size
        run: |
          SIZE=$(du -sk dist/ | cut -f1)
          echo "Bundle size: ${SIZE}KB"
          if [ "$SIZE" -gt 10240 ]; then
            echo "::warning::Bundle size exceeds 10MB (${SIZE}KB)"
          fi

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend_python/requirements.txt
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install Python deps
        run: |
          pip install -r backend_python/requirements.txt
          pip install -r multimodelrag/requirements.txt
          pip install pytest httpx
      - name: Run tests
        run: cd backend_python && python -m pytest tests/ -v
        env:
          DATABASE_URL: sqlite:///./test.db
          GROQ_API_KEY: test_key
          JWT_SECRET_KEY: test_secret_key_for_ci

  # ── Stage 3: Docker build (needs Stage 2) ──────────────────────────────
  docker-build:
    name: Docker build test
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-test]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend_python/Dockerfile -t data2dash-backend:test .
      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t data2dash-frontend:test --build-arg VITE_API_URL=http://localhost:8000 .

  # ── Stage 4: Deploy (main branch push only) ────────────────────────────
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/data2dash
            git pull origin main
            sudo docker compose up -d --build
            sudo docker image prune -f
            echo "Waiting for services..."
            sleep 15
            echo "=== Container status ==="
            sudo docker compose ps
