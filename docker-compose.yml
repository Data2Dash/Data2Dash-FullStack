services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: data2dash
      POSTGRES_USER: data2dash
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U data2dash"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend_python/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://data2dash:${DB_PASSWORD}@db:5432/data2dash
      GROQ_API_KEY: ${GROQ_API_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${FRONTEND_URL}
    volumes:
      - uploads:/app/backend_python/data/uploads
      - multimodel_temp:/app/backend_python/data/multimodel_temp
      - multimodel_exports:/app/backend_python/data/multimodel_exports

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${FRONTEND_URL}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-data2dash2026}
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: smtp.gmail.com:587
      GF_SMTP_USER: ${ALERT_EMAIL:-}
      GF_SMTP_PASSWORD: ${ALERT_EMAIL_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${ALERT_EMAIL:-noreply@data2dash.com}
      GF_SMTP_FROM_NAME: Data2Dash Alerts
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  pgdata:
  uploads:
  multimodel_temp:
  multimodel_exports:
  prometheus_data:
  grafana_data:
